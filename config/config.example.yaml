# ==========================================
# OCR配置（离线OCR，无需配置）
# ==========================================
ocr:
  confidence_threshold: 0.5  # 识别置信度阈值（0.0-1.0）

# ==========================================
# 界面配置
# ==========================================
gui:
  hotkey: "f9"              # 快速答题快捷键（可改为f10, f11等）
  quit_hotkey: "ctrl+q"     # 退出快捷键
  window_opacity: 0.95      # 结果窗口透明度
  auto_close_seconds: 0     # 自动关闭时间（0为不关闭）
  theme: "light"            # 主题：light, dark

# ==========================================
# 截图配置
# ==========================================
capture:
  save_screenshot: false    # 是否保存截图（调试用）
  screenshot_dir: "./screenshots"
  border_color: [255, 0, 0] # 选区边框颜色（RGB）
  border_width: 2           # 边框宽度

# ==========================================
# 日志配置
# ==========================================
logging:
  level: "INFO"             # 日志级别：DEBUG, INFO, WARNING, ERROR
  save_to_file: true        # 是否保存日志
  log_file: "./logs/app.log"

