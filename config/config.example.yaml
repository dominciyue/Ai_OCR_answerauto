# AI配置示例 - 国产大模型版

# ==========================================
# 推荐配置：DeepSeek（性价比最高）
# ==========================================
ai:
  provider: "openai"
  api_key: "your-deepseek-api-key-here"  # 在 https://platform.deepseek.com/ 获取
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com"
  timeout: 30
  max_retries: 3

